name: Auto-Catalog Generator

on:
  push:
    branches: [main]
    paths:
      - 'categories/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install @octokit/rest marked

      - name: Generate catalog
        run: node .github/scripts/generate-catalog.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Update catalog [skip ci]"
          git push
